name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: python -m compileall devops_toolkit tests
      - run: pytest
      - run: mkdir -p reports
      - run: devops-audit . --config devops-audit.config.json --format markdown --output reports/audit-report.md --fail-on-high
      - run: devops-audit . --config devops-audit.config.json --format json --output reports/audit-report.json
      - run: devops-audit . --config devops-audit.config.json --format html --output reports/audit-report.html
      - run: devops-audit . --config devops-audit.config.json --format sarif --output reports/audit-report.sarif
      - uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: reports/
