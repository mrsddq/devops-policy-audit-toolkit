name: Docker Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - devops_toolkit/**
      - tests/**
      - .github/workflows/docker-smoke.yml
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - devops_toolkit/**
      - tests/**
      - .github/workflows/docker-smoke.yml

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t devops-policy-audit-toolkit:smoke .
      - name: Show CLI help
        run: docker run --rm devops-policy-audit-toolkit:smoke --help
      - name: Scan repository mount
        run: docker run --rm -v "${PWD}:/repo:ro" devops-policy-audit-toolkit:smoke /repo --format json
